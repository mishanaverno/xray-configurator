worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;

        location /start {
            allow 127.0.0.1;
            deny all;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /scripts/start_xray.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.sock;
        }

        location /stop {
            allow 127.0.0.1;
            deny all;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /scripts/stop_xray.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.sock;
        }

        location /health {
            allow 127.0.0.1;
            deny all;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /scripts/health_xray.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.sock;
        }

        location /links {
            allow 127.0.0.1;
            deny all;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /scripts/get_links.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.sock;
        }

        location /client-routing {
            allow 127.0.0.1;
            deny all;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /scripts/get_client_routing.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.sock;
        }

        location /sni/add {
            allow 127.0.0.1;
            deny all;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /scripts/add_sni.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.sock;
        }

        location /sni/set {
            allow 127.0.0.1;
            deny all;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /scripts/set_sni.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.sock;
        }

        location /sni/list {
            allow 127.0.0.1;
            deny all;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /scripts/list_sni.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.sock;
        }

        location /short-ids/add {
            allow 127.0.0.1;
            deny all;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /scripts/add_short_id.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.sock;
        }

        location /short-ids/remove {
            allow 127.0.0.1;
            deny all;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /scripts/remove_short_id.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.sock;
        }

        location /update {
            allow 127.0.0.1;
            deny all;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /scripts/update_geodat.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.sock;
        }
    }
}

stream {
    map $ssl_preread_server_name $backend {
        default 127.0.0.1:8443;
    }

    server {
        listen 443      reuseport;
        listen [::]:443 reuseport;
        ssl_preread     on;
        proxy_pass      $backend;
        proxy_protocol  on;
        proxy_timeout   10m;
        tcp_nodelay     on;
    }
}
