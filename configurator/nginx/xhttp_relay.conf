worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;

        location /start {
            allow 127.0.0.1;
            deny all;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /scripts/start_xray.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.sock;
        }

        location /stop {
            allow 127.0.0.1;
            deny all;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /scripts/stop_xray.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.sock;
        }

        location /health {
            allow 127.0.0.1;
            deny all;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /scripts/health_xray.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.sock;
        }

        location /update {
            allow 127.0.0.1;
            deny all;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /scripts/update_geodat.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.sock;
        }
    }
}

stream {
    map $ssl_preread_server_name $backend {
        default 127.0.0.1:${XHTTP_PORT};
    }

    server {
        listen ${XHTTP_PUBLIC_PORT}      reuseport;
        listen [::]:${XHTTP_PUBLIC_PORT} reuseport;
        ssl_preread     on;
        proxy_pass      $backend;
        proxy_timeout   10m;
        tcp_nodelay     on;
    }
}
